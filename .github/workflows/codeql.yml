name: CodeQL

# CodeQL is GitHub's static analysis engine. It catches a different bug class
# than SpotBugs — broader security patterns (path traversal, SSRF, weak crypto,
# deserialization, injection) and high-impact code-smell rules across both the
# Java backend and the SvelteKit/TypeScript frontend.
#
# Triggers:
#   - push to main and PRs into main: gate every change like the rest of CI
#   - weekly cron: re-scan against the current CodeQL query packs, so newly
#     published queries find existing issues without waiting for a code change
#
# Findings are uploaded as SARIF; they show up under the repository's
# Security > Code scanning alerts tab. Failed CodeQL runs do not currently
# block merging — they are advisory in this iteration. To make them blocking,
# wire the workflow into branch protection rules once we are happy with the
# noise level on first runs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sunday 03:17 UTC — odd minute to avoid the top-of-hour load spike on
    # GitHub-hosted runners.
    - cron: "17 3 * * 0"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  # security-events: write is required for the SARIF upload step.
  security-events: write
  contents: read
  actions: read
  packages: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Use the security-and-quality query suite for broader coverage than
          # the default suite. Quality findings can be filtered out later if
          # the noise level is too high.
          queries: security-and-quality

      - name: Autobuild (Java)
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4
        with:
          working-directory: backend

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

name: Vulnerability scan

on:
  schedule:
    # Mon-Fri at 04:00 UTC — the NVD feed refreshes in the morning, so the scan
    # runs on fresh data without competing with weekday push traffic.
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

jobs:
  owasp-backend:
    name: Backend OWASP Dependency-Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Cache OWASP NVD data
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          # v2: bumped to discard the corrupt H2 DB that earlier 429-failed runs
          # cached (restored as a half-initialised DB -> "connectionPool is null").
          key: nvd-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-v2-${{ runner.os }}-

      - name: Check NVD API key availability
        id: nvd
        run: |
          if [ -n "${{ secrets.NVD_API_KEY }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::NVD_API_KEY secret is not set; scan will run without an API key and may hit rate limits (429)."
          fi

      - name: Run OWASP Dependency-Check
        run: |
          set +e
          # The NVD bulk API is chronically flaky (503/timeouts). Retry a couple of
          # times to ride over short hiccups; data downloaded on a failed attempt
          # stays in the data dir, so retries resume incrementally.
          attempt=1
          max=2
          rc=1
          log="$RUNNER_TEMP/dependency-check.out"
          while [ "$attempt" -le "$max" ]; do
            mvn --batch-mode org.owasp:dependency-check-maven:check \
              -DnvdApiKey="${{ secrets.NVD_API_KEY }}" \
              -DfailBuildOnCVSS=8 \
              -DskipTests \
              -Dformats=HTML,JSON,SARIF 2>&1 | tee "$log"
            rc=${PIPESTATUS[0]}
            [ "$rc" -eq 0 ] && break
            echo "::warning::dependency-check attempt $attempt failed (exit $rc)"
            attempt=$((attempt + 1))
            [ "$attempt" -le "$max" ] && sleep 120
          done

          if [ "$rc" -ne 0 ]; then
            # Soft-fail only on a transient NVD data-update outage (external, not our
            # code). A real vulnerability gate (failBuildOnCVSS) or any other error
            # still fails the job.
            if grep -qiE "Error updating the NVD Data|NVD Returned Status Code|Unable to continue dependency-check analysis" "$log" \
               && ! grep -qiE "dependencies were identified with vulnerabilities|Failed conditions" "$log"; then
              echo "::warning::NVD data update failed (transient NVD outage); scheduled scan skipped this run — CVE gating was NOT evaluated. It catches up once NVD is reachable."
              exit 0
            fi
            echo "::error::dependency-check failed (exit $rc)"
            exit "$rc"
          fi

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-vuln-report
          path: backend/target/dependency-check-report.*
          retention-days: 30
          if-no-files-found: warn

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('backend/target/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend/target/dependency-check-report.sarif

  npm-audit-frontend:
    name: Frontend npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit (full report)
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-npm-audit
          path: frontend/npm-audit-report.json
          retention-days: 30
          if-no-files-found: warn

      - name: Fail on high+ severity
        run: npm audit --audit-level=high

  cargo-audit-tauri:
    name: Tauri cargo audit (RustSec)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.2-${{ runner.os }}

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version 0.22.2 --locked

      # Full report (incl. accepted warnings) for the artifact; never fails here.
      - name: Audit (full JSON report)
        run: cargo audit --json > cargo-audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tauri-cargo-audit
          path: frontend/src-tauri/cargo-audit-report.json
          retention-days: 30
          if-no-files-found: warn

      # Gate: fails only on `vulnerability` advisories (cargo-audit default).
      # Accepted unmaintained/unsound warnings live in
      # frontend/src-tauri/.cargo/audit.toml.
      - name: Fail on vulnerabilities
        run: cargo audit

  generate-sboms:
    name: Generate CycloneDX SBOMs (npm / Maven / Cargo)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-cyclonedx binary
        id: cargo-cyclonedx-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-cyclonedx
          key: cargo-cyclonedx-0.5.9-${{ runner.os }}

      - name: Install cargo-cyclonedx
        if: steps.cargo-cyclonedx-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Generate frontend SBOM (npm)
        working-directory: frontend
        run: npm run regen:sbom

      - name: Generate backend SBOM (Maven)
        working-directory: frontend
        run: npm run regen:sbom:backend

      - name: Generate Tauri SBOM (Cargo)
        working-directory: frontend
        run: npm run regen:sbom:tauri

      - name: Validate SBOM schema
        working-directory: frontend
        run: npm run check:sbom

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: voxrox-mail-sboms
          path: |
            frontend/bom.json
            backend/target/bom.json
            frontend/src-tauri/bom.json
          retention-days: 90
          if-no-files-found: error

      - name: Trivy SBOM scan — frontend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: sbom
          scan-ref: frontend/bom.json
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Trivy SBOM scan — backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: sbom
          scan-ref: backend/target/bom.json
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Trivy SBOM scan — Tauri
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: sbom
          scan-ref: frontend/src-tauri/bom.json
          format: sarif
          output: trivy-tauri.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      # NOTE: Trivy SBOM-scan results are package/dependency findings with no
      # source artifact location, which GitHub code-scanning rejects
      # ("expected artifact location"). They also overlap with Dependabot and the
      # OWASP job above, so we do not push them to the Security tab — the reports
      # are kept as build artifacts below instead.
      - name: Upload Trivy raw reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-sbom-reports
          path: trivy-*.sarif
          retention-days: 30
          if-no-files-found: warn

name: Windows Signed Release

on:
  workflow_dispatch:
    inputs:
      skip-backend-tests:
        description: "Skip backend tests while packaging the sidecar."
        type: boolean
        required: true
        default: false
      release-tag:
        description: "GitHub Release tag to publish assets to. Required when running from a branch."
        type: string
        required: false
        default: ""

permissions:
  contents: write
  # Required by actions/attest-build-provenance: id-token for Sigstore OIDC,
  # attestations to record the provenance against the repository.
  id-token: write
  attestations: write

concurrency:
  group: windows-signed-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-signed-windows:
    name: Build signed Windows app
    runs-on: windows-latest

    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
      WINDOWS_DIGEST_ALGORITHM: ${{ vars.WINDOWS_DIGEST_ALGORITHM }}
      WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
      TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
      TAURI_UPDATER_ENDPOINTS: ${{ vars.TAURI_UPDATER_ENDPOINTS }}
      TAURI_UPDATER_WINDOWS_INSTALL_MODE: ${{ vars.TAURI_UPDATER_WINDOWS_INSTALL_MODE }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      # Enable the on-startup auto-update check in released builds. Vite bakes this
      # flag in at build time; the check only runs in PROD Tauri builds (gated in
      # frontend/src/lib/updates.ts) and only finds anything once a release is
      # published with latest.json at the updater endpoint. Manual "check for
      # updates" works regardless of this flag.
      VITE_ENABLE_AUTO_UPDATE_CHECK: '1'
      # OAuth client identifiers baked into the sidecar launcher by
      # package-sidecar-windows.ps1. Microsoft is a public client (no secret);
      # Google's "Desktop app" secret is non-confidential (shipped, PKCE-protected).
      # All three are stored as Actions secrets so they are masked in build logs.
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      MICROSOFT_OAUTH_CLIENT_ID: ${{ secrets.MICROSOFT_OAUTH_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release tag
        shell: pwsh
        run: |
          $tag = "${{ inputs['release-tag'] }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            if ("${{ github.ref_type }}" -ne "tag") {
              throw "release-tag input is required when this workflow is not running from a tag."
            }
            $tag = "${{ github.ref_name }}"
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Publishing release assets to tag $tag"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Package backend sidecar
        working-directory: backend
        shell: pwsh
        # AOT cache is always enabled for release builds. Measured saving:
        # ~37 % cold start (PERFORMANCE_BASELINE.md 2026-05-19). Dev sidecar
        # builds keep the default (OFF) to avoid the ~70 s training overhead
        # on every iteration.
        run: |
          # OAuth config is required by default (the script fails on a missing /
          # placeholder client-id); no flag needed. -AllowPlaceholderOAuth is the
          # local-only opt-out and must never appear here.
          $args = @("-File", "scripts/package-sidecar-windows.ps1", "-EnableAotCache")
          if ("${{ inputs['skip-backend-tests'] }}" -eq "true") {
            $args += "-SkipTests"
          }
          & pwsh @args

      - name: Sync backend sidecar into Tauri bundle
        working-directory: frontend
        run: npm run sidecar:sync:windows -- ..\backend\target\sidecar\x86_64-pc-windows-msvc src-tauri\binaries

      # Release gate: launch the packaged sidecar headless and assert the CORS
      # contract through the real WebView2 origin (http://tauri.localhost). A
      # `tauri dev` run / backend-only probe cannot catch an allowlist
      # regression because the webview origin only exists in a bundle — this is
      # the integration counterpart to SecurityConfigTest. Runs before signing
      # so a broken build fails fast.
      - name: Sidecar CORS contract smoke
        working-directory: frontend
        run: npm run tauri:smoke:sidecar-cors

      # Authenticode signing is optional for this OSS build (no paid cert). When
      # the certificate secret is absent the installer ships unsigned and
      # authenticity rests on the build-provenance attestation + updater
      # signature. Secrets are not readable in step `if:` conditions, so surface
      # availability as a step output first.
      - name: Detect signing certificate
        id: signing
        shell: pwsh
        run: |
          $available = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)
          "available=$($available.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Authenticode signing available: $available"

      - name: Import Windows code signing certificate
        if: steps.signing.outputs.available == 'true'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            throw "WINDOWS_CERTIFICATE_BASE64 secret is required."
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw "WINDOWS_CERTIFICATE_PASSWORD secret is required."
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_THUMBPRINT)) {
            throw "WINDOWS_CERTIFICATE_THUMBPRINT secret is required."
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-code-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password | Out-Null

      - name: Prepare Tauri release config
        working-directory: frontend
        run: npm run tauri:release-config:windows

      - name: Validate Tauri updater signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is required to create updater signatures."
          }

      - name: Sign backend sidecar executable
        if: steps.signing.outputs.available == 'true'
        working-directory: frontend
        shell: pwsh
        run: .\scripts\sign-windows-file.ps1 -Path .\src-tauri\binaries\mail-x86_64-pc-windows-msvc.exe

      # The release config omits the Authenticode block when no certificate is
      # configured (see prepare-tauri-windows-release-config.mjs), so this signs
      # the bundle only when a cert is present; updater .sig artifacts are always
      # produced (TAURI_SIGNING_PRIVATE_KEY).
      - name: Build Tauri bundle
        working-directory: frontend
        run: npm run tauri:build -- --config src-tauri/tauri.release.conf.json

      - name: Generate Tauri updater manifest
        working-directory: frontend
        run: npm run tauri:generate-latest:windows

      - name: Verify signatures
        if: steps.signing.outputs.available == 'true'
        working-directory: frontend
        shell: pwsh
        run: |
          $paths = @(
            ".\src-tauri\binaries\mail-x86_64-pc-windows-msvc.exe",
            ".\src-tauri\target\release\bundle"
          )
          .\scripts\verify-windows-signatures.ps1 -Path $paths

      # Strong, free supply-chain authenticity for an OSS build with no paid
      # Authenticode certificate: a Sigstore-backed build-provenance attestation
      # cryptographically ties the installer to this workflow + commit. Unlike a
      # bare checksum (which an attacker who can rewrite the release rewrites too),
      # it is verifiable out-of-band with
      #   gh attestation verify <file> --repo ${{ github.repository }}
      - name: Attest installer build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: frontend/src-tauri/target/release/bundle/nsis/voxrox-mail-*-setup.exe

      - name: Upload signed Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mail-windows-signed-${{ github.run_number }}
          path: |
            frontend/src-tauri/target/release/bundle/**
            frontend/src-tauri/target/release/latest.json
          if-no-files-found: error

      - name: Publish GitHub Release assets
        working-directory: frontend
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            Get-ChildItem -Path ".\src-tauri\target\release\bundle" -Recurse -File |
              Where-Object { $_.Name -match "^voxrox-mail-.+-setup\.exe(\.sig)?$" } |
              Select-Object -ExpandProperty FullName
          )
          $assets += (Resolve-Path ".\src-tauri\target\release\latest.json").Path

          if ($assets.Count -eq 0) {
            throw "No release assets found."
          }

          # Publish a SHA256 checksum next to each installer so users can verify
          # the download's integrity (`certutil -hashfile <file> SHA256` on
          # Windows, `sha256sum -c <file>.sha256` elsewhere). The .sig/latest.json
          # are updater-internal and not user-downloaded, so they are not hashed.
          foreach ($installer in @($assets | Where-Object { $_ -match "-setup\.exe$" })) {
            $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer).Hash.ToLower()
            $name = [System.IO.Path]::GetFileName($installer)
            $sumPath = "$installer.sha256"
            [System.IO.File]::WriteAllText($sumPath, "$hash *$name`n")
            $assets += $sumPath
            Write-Host "Checksum $name = $hash"
          }

          gh release view $env:RELEASE_TAG | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create $env:RELEASE_TAG --draft --title "VoxRox Mail $env:RELEASE_TAG"
          }

          gh release upload $env:RELEASE_TAG @assets --clobber

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # The spotless <eclipse> step provisions Eclipse JDT via P2 from
      # download.eclipse.org. The composite-repo metadata expires from the
      # local P2 cache (~/.m2/repository/dev/equo/p2-data), so even a warm
      # Maven cache hits the network, and transient CDN errors (e.g.
      # okhttp3 StreamResetException: INTERNAL_ERROR) fail the step.
      # Retry with backoff (30 s, then 60 s) before failing the job.
      - name: Check formatting
        run: |
          for attempt in 1 2 3; do
            if mvn --batch-mode spotless:check; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              delay=$((attempt * 30))
              echo "spotless:check failed (attempt $attempt/3); retrying in ${delay}s..."
              sleep "$delay"
            fi
          done
          echo "spotless:check failed after 3 attempts"
          exit 1

      # Runs on the runner's preinstalled Node — the script has no npm deps.
      - name: Translation whitelist lint
        run: node ../frontend/scripts/check-translation-whitelist.mjs --target=backend --mode=strict

      # Same — no npm deps. Guards cs/en key + placeholder parity and that
      # messages.properties stays identical to the Czech base bundle.
      - name: Backend i18n key parity
        run: node ../frontend/scripts/check-backend-i18n-keys.mjs

      # `mvn verify` runs unit + integration tests AND spotbugs:check (bound in
      # backend/pom.xml). One job step, one gate — matches what a local
      # `mvn verify` does, so a green local build means a green CI build for
      # this job.
      - name: Run unit + integration tests + SpotBugs
        run: mvn --batch-mode verify

      - name: Upload coverage report (unit + IT merged)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: |
            backend/target/site/jacoco/
            backend/target/site/jacoco-merged/
          retention-days: 14
          if-no-files-found: warn

  tauri:
    name: Tauri (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # The sidecar (externalBin "binaries/mail") and the bundled resources
      # ("binaries/app", "binaries/runtime") are Windows-only artifacts produced
      # by the release packaging job; they do not exist on this Linux runner.
      # tauri-build validates their existence in the build script, so stub them
      # before cargo check — static analysis (check/clippy/audit) validates the
      # Rust crate and never reads the stub contents. resources/NOTICE.txt is
      # committed, so it needs no stub.
      - name: Stub sidecar and resources for static checks
        run: |
          install -Dm755 /dev/null binaries/mail-x86_64-unknown-linux-gnu
          mkdir -p binaries/app binaries/runtime
          : > binaries/app/.stub
          : > binaries/runtime/.stub

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: cargo check
        run: cargo check

      - name: cargo clippy
        run: cargo clippy --no-deps -- -D warnings

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-0.22.2-${{ runner.os }}

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version 0.22.2 --locked

      # Fails only on `vulnerability` advisories (cargo-audit default). Accepted
      # unmaintained/unsound warnings live in frontend/src-tauri/.cargo/audit.toml.
      - name: cargo audit (RustSec)
        run: cargo audit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      - name: Run lint
        run: npm run lint

      - name: Dead-code analysis (knip)
        run: npm run knip

  check:
    name: Svelte check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check API schema drift
        run: npm run check:api

      - name: Translation whitelist lint
        run: npm run check:translations:strict

      - name: Run check
        run: npm run check

  test-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14
          if-no-files-found: warn

  test-functional:
    name: Functional tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run functional tests
        run: npm run test:functional:stable

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: functional-test-results
          path: frontend/test-results/
          if-no-files-found: ignore

  test-a11y:
    name: Accessibility tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npm run test:a11y:stable

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-test-results
          path: frontend/test-results/
          if-no-files-found: ignore

  backend-build:
    name: Backend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      MAIL_CRYPTO_KEY: ci-only-dummy-crypto-key-must-be-32-chars-min
      MAIL_CRYPTO_SALT: ci-only-dummy-crypto-salt
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Package JAR
        run: mvn --batch-mode -DskipTests package

      - name: Upload backend JAR
        uses: actions/upload-artifact@v7
        with:
          name: backend-jar
          path: backend/target/mail-backend-*.jar
          retention-days: 7
          if-no-files-found: error

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7
          if-no-files-found: error

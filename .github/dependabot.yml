version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Europe/Prague
    open-pull-requests-limit: 5

  - package-ecosystem: cargo
    directory: /frontend/src-tauri
    schedule:
      interval: weekly
      day: monday
      time: '08:30'
      timezone: Europe/Prague
    open-pull-requests-limit: 5

  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: '08:45'
      timezone: Europe/Prague
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Prague
    open-pull-requests-limit: 5

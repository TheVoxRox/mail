# Dependabot configuration.
#
# Grouping policy: minor + patch updates are bundled into a small number of
# grouped PRs per ecosystem (production vs development where the ecosystem
# distinguishes them) to cut weekly PR volume and keep related tooling moving
# together. MAJOR updates are deliberately left OUT of every group so each one
# lands as its own PR for manual review — a lone major that outruns its peers
# (e.g. typescript ahead of typescript-eslint) is exactly the kind of
# breaking/peer-conflict change that must not be auto-bundled.
version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    groups:
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /frontend/src-tauri
    schedule:
      interval: weekly
      day: monday
      time: '08:30'
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: '08:45'
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    groups:
      maven-production:
        dependency-type: production
        update-types:
          - minor
          - patch
      maven-development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Europe/Prague
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        update-types:
          - minor
          - patch

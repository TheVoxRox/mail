<!doctype html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <title>Přihlášení dokončeno / Login Successful</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fb;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 2.5rem 3rem;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            text-align: center;
            max-width: 28rem;
        }
        h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
        p { margin: 0; color: #4b5563; line-height: 1.5; }

        /* Styl pro anglický text */
        .en {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            font-size: 0.9rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <main class="card">
        <section>
            <h1>Přihlášení dokončeno</h1>
            <p>Toto okno můžete zavřít a vrátit se do aplikace VoxRox Mail.</p>
        </section>

        <section class="en">
            <h1>Login Successful</h1>
            <p>You can now close this window and return to the app VoxRox Mail.</p>
        </section>
    </main>
</body>
</html>

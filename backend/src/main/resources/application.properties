spring.application.name=mail
# Data root for the DB, attachments, logs, tmp, and sidecar session files (session.json, .ready).
# The Tauri sidecar sets APP_DATA_DIR to app_local_data_dir() — see frontend/src/lib/backend/sidecar.ts.
# Standalone runs (mvn spring-boot:run) fall back to ${user.home}/.voxrox/mail.
app.data-dir=${APP_DATA_DIR:${user.home}/.voxrox/${spring.application.name}}
spring.threads.virtual.enabled=true
spring.main.banner-mode=off
spring.jmx.enabled=false
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# --- Security (Crypto) ---
# Algorithm/IV/tag/key length live as constants in CryptoService — they are
# part of the on-disk ciphertext format, not tunables.
mail.crypto.key=${MAIL_CRYPTO_KEY}
mail.crypto.salt=${MAIL_CRYPTO_SALT}
mail.crypto.pbkdf2-iterations=600000
mail.crypto.max-cache-size=100

# --- Network Hardening ---
server.address=127.0.0.1
# 0 = random free loopback port. The actual port is written to session.json as
# baseUrl after startup so the Tauri client does not have to rely on a fixed
# number.
server.port=0
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=10s

# --- Production error handling ---
# Boot 4 moved these keys from server.error.* to spring.web.error.* — the old
# names are deprecation level=error, i.e. SILENTLY ignored. The values equal
# the framework defaults; they stay explicit as a hardening pin so a future
# default change upstream cannot quietly start leaking messages/stacktraces.
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never

# --- Database (Hardening & Performance) ---
spring.datasource.url=jdbc:sqlite:${app.data-dir}/db/${spring.application.name}.db?journal_mode=WAL&synchronous=NORMAL&foreign_keys=ON&busy_timeout=5000&cache_size=-20000
spring.datasource.driverClassName=org.sqlite.JDBC

# --- HikariCP ---
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.pool-name=MailPool
spring.datasource.hikari.connection-timeout=20000

# --- JPA and Hibernate ---
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none

# --- DB Backup (pre-migration snapshot) ---
mail.backup.retention-count=3

# --- DB maintenance (SQLite housekeeping) ---
# Two scheduled passes in DatabaseMaintenanceService, both best-effort (any
# failure is logged and retried next cycle):
#  * optimize -> PRAGMA optimize(0x10002): refreshes query-planner statistics so
#               index-based plans stay chosen. Cheap, runs often.
#  * reclaim  -> PRAGMA wal_checkpoint(TRUNCATE) every cycle + a VACUUM gated on
#               the free-page thresholds below. Expensive (VACUUM rewrites the
#               whole file under an exclusive lock), runs rarely.
# Durations are ISO-8601 (PT10M, PT6H, PT24H). Fixed delay, not cron, so a
# machine asleep at a given wall-clock time still gets the pass once it wakes.
mail.client.db.optimize-initial-delay=PT10M
mail.client.db.optimize-interval=PT6H
mail.client.db.reclaim-initial-delay=PT30M
mail.client.db.reclaim-interval=PT24H
# VACUUM runs only when BOTH thresholds are met: at least this many free pages
# (absolute floor, so tiny DBs are left alone) AND at least this fraction of the
# file made up of free pages (so a large but dense mailbox is not rewritten for
# a handful of free pages). Free pages accrue from recency-window prune, folder
# deletes and re-sync churn.
mail.client.db.vacuum-min-free-pages=2000
mail.client.db.vacuum-free-ratio=0.25

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Initial schema (already created by Hibernate)
spring.flyway.mixed=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# --- Logging ---
logging.file.name=${app.data-dir}/logs/${spring.application.name}.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=100MB

logging.level.org.voxrox.mailbackend=INFO
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.web=WARN

# --- Management (Actuator) ---
# Endpoint access model (Boot 3.4+): everything locked down by default, only
# the health endpoint readable. Replaces the deprecated enabled-by-default
# (warn-level, would die at the next major) and management.endpoint.health.enabled
# (already absent from Boot 4 metadata).
management.endpoints.access.default=none
management.endpoint.health.access=read-only
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.health.diskspace.enabled=true
management.endpoints.web.base-path=/api/internal
management.endpoints.web.exposure.include=health

# --- Google OAuth2 ---
# Google "Desktop app" clients are public clients, but Google's token endpoint
# still requires the client_secret in the code exchange. Per Google's
# installed-app guidance this secret "is not treated as a secret" — it is shipped
# in the build and the flow is protected by PKCE (see
# SecurityConfig#pkceAuthorizationRequestResolver), not by secret confidentiality.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:mail-local-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:mail-local-google-client-secret}
spring.security.oauth2.client.registration.google.scope=https://mail.google.com/,openid,email,profile
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?access_type=offline&prompt=consent

# --- Microsoft OAuth2 ---
# Tenant 'common' accepts personal (MSA) and work/school (AAD) accounts under a
# single registration — the backend distinguishes individual users via the 'oid'
# claim, which is stable per tenant. Scopes:
#   - openid email profile  -> OIDC userinfo (email, name, sub/oid)
#   - offline_access        -> refresh token (Microsoft will not issue one otherwise; the prompt parameter has no effect on this)
#   - IMAP.AccessAsUser.All -> IMAP4 access to Outlook/Exchange Online
#   - SMTP.Send             -> sending via Outlook/Exchange Online SMTP
# Public client (RFC 8252 / OAuth 2.1): a desktop app cannot keep a client
# secret confidential, so Microsoft is registered as a public client
# (client-authentication-method=none) and the authorization-code flow is secured
# solely by PKCE — see SecurityConfig#pkceAuthorizationRequestResolver. No client
# secret is sent to the token endpoint or shipped in the installer; only the
# (public) client-id is baked into the build. Requires the Entra app registration
# to have "Allow public client flows" = Yes and the loopback redirect registered
# under the "Mobile and desktop applications" platform.
spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_OAUTH_CLIENT_ID:mail-local-microsoft-client-id}
spring.security.oauth2.client.registration.microsoft.scope=openid,email,profile,offline_access,https://outlook.office.com/IMAP.AccessAsUser.All,https://outlook.office.com/SMTP.Send
spring.security.oauth2.client.registration.microsoft.client-authentication-method=none
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code
# Spring Security pre-fills redirect-uri only for CommonOAuth2Provider (Google,
# Facebook, GitHub, Okta). Microsoft is custom, so we must spell it out
# explicitly; the {baseUrl} and {registrationId} placeholders are resolved by
# DefaultLoginPageGeneratingFilter at runtime based on the current Host header.
spring.security.oauth2.client.registration.microsoft.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize?prompt=select_account
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
# user-info-uri is INTENTIONALLY unset. The Microsoft v2 endpoint returns a
# single access_token per resource. Because our scopes mostly cover
# outlook.office.com (IMAP/SMTP), the access_token is for Outlook (opaque, not
# a JWT) and Microsoft Graph userinfo rejects it with 401 IDX14100. Spring
# extracts the user claims (oid, email, name, preferred_username) directly from
# the id_token, which Microsoft returns alongside thanks to the
# 'openid'+'profile'+'email' scopes.
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=https://login.microsoftonline.com/common/discovery/v2.0/keys
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub

# --- Mail client configuration ---
mail.client.imap.default-port=993
mail.client.imap.connection-timeout=30s
mail.client.imap.read-timeout=60s
mail.client.imap.protocol-ssl=imaps
mail.client.imap.protocol-standard=imap

mail.client.smtp.connection-timeout=30s

# --- IMAP connect / transient-blip retry logic ---
# Applies ONLY to transient network errors (SocketTimeoutException, ConnectException,
# SSLException without an auth subtype). AuthenticationFailedException has its own
# refresh-token path in ImapConnectionManager.executeWithLock and is exempt from retry.
# Used in two places: (1) store.connect() in ImapConnectionManager, and (2) the
# per-folder sync cycle in MailSyncService.performFullSyncCycle, which retries a
# transient blip that surfaces mid-cycle (Angus "failed to create new store connection")
# after reconnecting, instead of recording it as a hard last_error.
# 3 attempts * exponential backoff (500ms -> 1s -> 2s, max 5s, with jitter) = ~4s max delay.
mail.client.retry.max-attempts=3
mail.client.retry.initial-delay=500ms
mail.client.retry.max-delay=5s
mail.client.retry.multiplier=2.0

# --- Sync settings ---
mail.client.sync.window-size=100
mail.client.sync.batch-size=200
mail.client.sync.interval=5m
mail.client.sync.initial-delay=10s
mail.client.sync.default-page-size=50
mail.client.sync.backfill-batch-size=30
# Safety cap on locally stored rows per folder. The local cache is a recency window plus any
# lazy-fetched older pages the user has visited; we only prune when the row count exceeds this
# bound, so normal usage (even hundreds of opened older pages) stays untouched.
mail.client.sync.local-window-limit=10000
# Max number of accounts synchronized concurrently. SQLite WAL still = 1 writer, but with
# busy_timeout=5000 (see spring.datasource.url) contention degrades gracefully — writers
# queue up instead of failing. 4 = matches HikariCP pool size, gives a comfortable overlap
# of IMAP IO and short DB bursts.
mail.client.sync.max-concurrent-accounts=4
# Max search query length (DoS guard, FTS5 prefix matching).
mail.client.sync.search-query-max-length=256
# Upper bound on page size for paginated endpoints (DoS guard — without it a client could
# request size=1000000 and eat memory). Default 200 = 4x defaultPageSize, plenty of room
# for power-user UI and still safe. Default size (when the client does not specify size)
# lives in sync.default-page-size.
mail.client.sync.api-max-page-size=200
# SSE notifications — timeout for the emitter (after which the connection is closed and
# the client reconnects) and the heartbeat interval (keep-alive comment that prevents
# proxy/firewall timeouts).
mail.client.sync.sse-timeout=30m
mail.client.sync.sse-heartbeat-interval=30s

# --- Client config contract for the frontend ---
# Safe/recommended values exposed via GET /api/v1/client-config.
# UI preferences (language, theme, layout) stay local to the frontend.
mail.client-config.contact-default-page-size=20
mail.client-config.contact-query-max-length=100
mail.client-config.contact-autocomplete-default-limit=10
mail.client-config.contact-autocomplete-max-limit=20
mail.client-config.attachment-max-bytes=10485760
mail.client-config.attachment-total-max-bytes=26214400
mail.client-config.large-attachment-warning-bytes=5242880

# --- Misc ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.profiles.active=prod

# --- Jackson ---
# Enum values in JSON requests are matched case-insensitively (the client can
# send "home", "HOME", or "Home"). Applies globally to all enums in the API.
spring.jackson.mapper.accept-case-insensitive-enums=true

# --- OpenAPI / Swagger ---
# The production sidecar does not expose documentation endpoints. The OpenAPI
# snapshot/generation is enabled explicitly via springdoc.api-docs.enabled=true.
springdoc.api-docs.enabled=${MAIL_OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled=${MAIL_SWAGGER_UI_ENABLED:false}
# The actuator is not a client REST API — keep it out of the docs.
springdoc.paths-to-exclude=/api/internal/**
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

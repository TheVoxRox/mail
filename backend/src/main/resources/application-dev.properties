# Dev profile — you see the full stacktrace in ProblemDetail, in case the
# frontend reports a generic error. NOT active by default; enable with
# `mvn spring-boot:run -Dspring-boot.run.profiles=dev` or
# `-Dspring.profiles.active=dev`. The production sidecar (Tauri bundle) runs
# the `prod` profile via a hardcoded default in application.properties — this
# override NEVER ships into the release JAR.
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-exception=true
server.error.include-binding-errors=on_param

# Debug visibility for SQL and Spring web — do not enable in the prod log.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.voxrox.mailbackend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

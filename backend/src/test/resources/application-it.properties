# Test profile for repository integration tests.
# SQLite in a tmp file (not :memory:, because Hikari shares connections and
# :memory: creates a separate DB per connection) — the test then gets a real
# SQLite + Flyway migrations and pool-size=1 guarantees everyone sees the same data.

# spring.datasource.url is set in the IT test via @DynamicPropertySource — that
# also creates the parent directory under JUnit @TempDir, so every run gets a
# fresh DB and no leftovers from previous runs.
app.data-dir=${java.io.tmpdir}/mail-it
spring.datasource.driverClassName=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# Quieter logging during tests
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=WARN

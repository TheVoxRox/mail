# cargo-audit configuration — see https://github.com/rustsec/rustsec/tree/main/cargo-audit
#
# Policy: the build FAILS on any `vulnerability` advisory (cargo-audit default,
# exit code 1). Most IDs listed below are `unmaintained` / `unsound` *warnings*
# that have been reviewed and accepted for the V0.1.0 Windows release. Ignoring
# an advisory ID only suppresses that specific notice — a future *vulnerability*
# in the same crate has a different ID and will still fail the audit.
#
# A `vulnerability` may be ignored only TEMPORARILY, with the exposure analysis
# and the removal condition written next to it (see the last section below).
#
# Reviewed: 2026-06-13 (cargo audit over Cargo.lock, 597 crate deps, 0 vulns).
# Re-reviewed: 2026-07-02 (RUSTSEC-2026-0194, see below).
# Re-review when a NEW advisory appears (the whole point of the scheduled scan).

[advisories]
ignore = [
    # --- gtk-rs GTK3 bindings: unmaintained (gtk-rs moved to GTK4) ---
    # Linux-only transitive deps of webkit2gtk via Tauri. V0.1.0 ships
    # Windows-only (see SECURITY_THREAT_MODEL.md §intro), so these crates are
    # not compiled into the release binary at all.
    "RUSTSEC-2024-0411", # gdkwayland-sys
    "RUSTSEC-2024-0412", # gdk
    "RUSTSEC-2024-0413", # atk
    "RUSTSEC-2024-0414", # gdkx11-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # atk-sys
    "RUSTSEC-2024-0417", # gdkx11
    "RUSTSEC-2024-0418", # gdk-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    "RUSTSEC-2024-0429", # glib — unsound VariantStrIter (same Linux-only GTK stack)

    # --- Other unmaintained transitive deps (no maintained drop-in; not our direct deps) ---
    "RUSTSEC-2024-0370", # proc-macro-error — build-time proc-macro only, not in the runtime binary
    "RUSTSEC-2025-0057", # fxhash — transitive hash impl
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident

    # --- Conditional unsoundness, accepted for V0.1.0 ---
    # rand 0.7.3 + 0.8.5 (transitive). Unsound only when a custom global logger
    # itself calls rand::rng() during rand init — not a pattern this app uses.
    "RUSTSEC-2026-0097", # rand

    # --- TEMPORARY vulnerability ignores (remove as soon as upstream allows) ---
    # quick-xml 0.38.x, two advisories published 2026-06-29: quadratic run time
    # on duplicate-attribute checks (-0194) and unbounded namespace-declaration
    # allocation in NsReader (-0195). Both are DoS class, no memory safety
    # impact. Reviewed 2026-07-02: quick-xml enters the graph only via
    # plist -> tauri-utils (Apple property-list parsing, used by
    # tauri-build/codegen at build time); the Windows-only app never feeds
    # attacker-controlled XML to it at runtime (mail parsing lives in the Java
    # backend). The fix requires quick-xml >=0.41.0, but the latest plist (1.9.0)
    # still pins the 0.39.x line, so there is no upgrade path yet.
    # REMOVE both ignores (and `cargo update`) once plist/tauri-utils pull
    # quick-xml >=0.41.0.
    "RUSTSEC-2026-0194", # quick-xml — quadratic duplicate-attribute check
    "RUSTSEC-2026-0195", # quick-xml — NsReader namespace-allocation DoS
]
